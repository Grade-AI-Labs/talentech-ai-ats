services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    command: pnpm --filter @talentech/api dev
    env_file:
      - path: .env
        required: false
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    command: pnpm --filter @talentech/web dev
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_HOST: 0.0.0.0
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
